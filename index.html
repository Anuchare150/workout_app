<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Workout Planner — Upper / Leg / Cardio</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    :root{
      --bg1:#071126; --bg2:#0d2444;
      --card:#0b2036;
      --muted:rgba(255,255,255,0.78);
      --accent1:#6d28d9; --accent2:#06b6d4;
      --accent-strong:#4f46e5;
      --input-bg:#0f2238;
      --radius:12px;
      --max-w:980px;
      --success:#10b981;
      --danger:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:#fff;padding:18px;-webkit-font-smoothing:antialiased;
    }

    .wrap{max-width:var(--max-w);margin:0 auto}
    .app{background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.003));padding:16px;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.03)}
    header{display:flex;gap:12px;align-items:center;margin-bottom:12px}
    .logo{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800}
    h1{margin:0;font-size:18px}
    p.lead{margin:0;color:var(--muted);font-size:13px}

    .panel{background:rgba(255,255,255,0.02);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);margin-bottom:12px}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
    label.small{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}

    /* Inputs: mobile-friendly */
    input[type="text"], input[type="number"], input[type="date"], select, textarea {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.08);
      background:var(--input-bg);
      color:#fff;
      font-size:16px; /* prevents iOS zoom on focus */
      -webkit-text-fill-color:#fff;
      -webkit-appearance:none;
      appearance:none;
    }
    ::placeholder{color:rgba(255,255,255,0.45)}

    .col-3{grid-column:span 3}
    .col-4{grid-column:span 4}
    .col-6{grid-column:span 6}
    .col-12{grid-column:span 12}
    .actions{display:flex;gap:8px;align-items:center}
    button{background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#fff;border:0;padding:10px 12px;border-radius:8px;cursor:pointer;font-weight:700}
    button.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:#fff}

    /* Exercises list */
    .ex-list{display:flex;flex-direction:column;gap:10px;margin-top:8px}
    .ex-item{
      display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);
      background:linear-gradient(180deg, rgba(255,255,255,0.005), rgba(255,255,255,0.002));
      -webkit-tap-highlight-color: transparent;
    }
    .ex-item.selected{
      background:linear-gradient(180deg, rgba(79,70,229,0.08), rgba(6,182,212,0.02));
      box-shadow:0 8px 20px rgba(2,6,23,0.08);
      border-color: rgba(6,182,212,0.2);
    }
    .ex-left{display:flex;align-items:center;gap:12px;flex:1 1 auto; cursor:pointer; user-select:none;}
    .ex-name{font-weight:700}
    
    /* BULLETPROOF CUSTOM CHECKBOX FOR DARK MODE ON IOS */
    .ex-checkbox{
      -webkit-appearance: none !important;
      appearance: none !important;
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      cursor: pointer; 
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      background-color: var(--input-bg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.2s ease;
    }
    
    .ex-checkbox:checked {
      background-color: var(--accent-strong) !important;
      border-color: var(--accent-strong) !important;
    }

    /* Modern SVG Tickmark injection inside the empty element space */
    .ex-checkbox:checked::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 11px;
      border: solid #ffffff;
      border-width: 0 3px 3px 0;
      transform: rotate(45deg);
      top: 3px;
      left: 7px;
    }

    .ex-controls{display:flex;gap:8px;align-items:center;margin-left:auto;flex:0 0 auto;flex-wrap:nowrap}
    .small-input{
      width:68px !important;
      min-width:68px !important;
      padding:8px !important;
      border-radius:8px !important;
      border:1px solid rgba(255,255,255,0.06) !important;
      background:var(--input-bg) !important;
      color:#fff !important;
      text-align:center !important;
      font-size:15px !important;
      -webkit-appearance: none !important;
      appearance: none !important;
    }

    .plan{display:flex;flex-direction:column;gap:10px;margin-top:10px}
    .session{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);background:linear-gradient(180deg, rgba(255,255,255,0.003), rgba(255,255,255,0.001))}
    .meta{width:180px;flex-shrink:0}
    .date{font-weight:800}
    .weekday{color:var(--muted);font-size:13px;margin-top:4px}
    table{width:100%;border-collapse:collapse;color:#fff;font-size:14px}
    th,td{padding:8px 10px;text-align:left;border-bottom:1px dashed rgba(255,255,255,0.05)}
    th{color:var(--muted);font-weight:700;font-size:13px}
    .done-btn{padding:8px 10px;border-radius:8px;background:linear-gradient(90deg,var(--success),#059669);color:#fff;border:0;cursor:pointer;font-weight:700}
    .done-btn.true{background:rgba(255,255,255,0.1);color:var(--muted)}
    .trash{background:transparent;border:0;color:var(--danger);cursor:pointer;font-weight:700;padding:6px}

    .exportbox{width:100%;height:90px;padding:10px;border-radius:8px;border:1px dashed rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);color:#fff;resize:vertical}
    .muted{color:var(--muted);font-size:13px}

    @media(max-width:880px){
      .col-3{grid-column:span 6}
      .grid{gap:8px}
      .session{flex-direction:column;gap:16px}
      .meta{width:100%}
      .small-input{width:60px !important;min-width:60px !important}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app" role="application" aria-label="Workout Planner">
      <header>
        <div class="logo">WP</div>
        <div>
          <h1>Workout Planner</h1>
          <p class="lead">Leg, Upper Body, Cardio — set kg, sets, reps, and durations. Tap items to select.</p>
        </div>
      </header>

      <div class="panel" aria-label="Session builder">
        <form id="sessionForm" onsubmit="return false;">
          <div class="grid">
            <div class="col-3">
              <label class="small">Date</label>
              <input id="sessionDate" type="date" />
            </div>
            <div class="col-3">
              <label class="small">Workout type</label>
              <select id="workoutType" aria-label="Workout type">
                <option value="leg">Leg Workout</option>
                <option value="upper">Upper Body</option>
                <option value="cardio">Cardio</option>
              </select>
            </div>
            <div class="col-3">
              <label class="small">Session calories (kcal)</label>
              <input id="sessionCalories" type="number" min="0" value="0" />
            </div>
            <div class="col-3">
              <label class="small">Notes</label>
              <input id="sessionNotes" type="text" placeholder="optional" />
            </div>

            <div class="col-12">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <div style="font-weight:800">Exercises</div>
                <div class="muted">Tap the item or checkbox to toggle selection.</div>
              </div>
              <div id="exercisesArea" class="ex-list" aria-live="polite"></div>
            </div>

            <div class="col-12" style="display:flex;align-items:center;gap:8px;margin-top:8px">
              <div class="actions">
                <button id="addSessionBtn" type="button">Add Session</button>
                <button id="clearAllBtn" type="button" class="ghost">Clear All</button>
              </div>
              <div style="margin-left:auto" class="muted">Saved locally on this device (no network).</div>
            </div>
          </div>
        </form>
      </div>

      <div id="planArea" class="plan" aria-live="polite"></div>

      <div class="panel" style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div>
            <strong>Backup / Restore</strong>
            <div class="muted">Copy JSON to back up or paste to restore.</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button id="exportBtn" class="ghost" type="button">Copy JSON</button>
            <button id="importBtn" class="ghost" type="button">Load JSON</button>
          </div>
        </div>
        <textarea id="exportBox" class="exportbox" placeholder="Data JSON will appear here"></textarea>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const STORAGE_KEY = 'workout_planner_v_final_pwa_v3';

      const CATALOG = {
        leg: [
          { id:'legpress', name:'Leg Press', defaultWeight:26, sets:3, reps:10 },
          { id:'legcurl', name:'Leg Curl', defaultWeight:26, sets:3, reps:10 },
          { id:'squats', name:'Weighted Squats', defaultWeight:4, sets:3, reps:10 },
          { id:'lunges', name:'Lunges', defaultWeight:2, sets:3, reps:10 }
        ],
        upper: [
          { id:'pull', name:'Lat Pull-down / Row', defaultWeight:20, sets:3, reps:8 },
          { id:'bench', name:'Bench Press', defaultWeight:20, sets:3, reps:8 },
          { id:'ohp', name:'Overhead Press', defaultWeight:10, sets:3, reps:8 },
          { id:'dbrow', name:'Dumbbell Row', defaultWeight:12, sets:3, reps:8 },
          { id:'curl', name:'Bicep Curl', defaultWeight:6, sets:3, reps:10 }
        ],
        cardio: [
          { id:'treadmill', name:'Treadmill', defaultDuration:20 }
        ]
      };

      const qs = s => document.querySelector(s);
      const qsa = s => Array.from(document.querySelectorAll(s));

      function fmtDate(d){
        return `${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`;
      }
      function parseDate(s){ return s ? new Date(s+'T00:00:00') : new Date(); }
      function weekdayName(d){ return d.toLocaleDateString(undefined,{weekday:'short'}); }

      function loadPlan(){
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e){ return []; }
      }
      function savePlan(p){ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

      function buildExercisesUI(type){
        const area = qs('#exercisesArea');
        area.innerHTML = '';
        const list = CATALOG[type] || [];
        
        list.forEach(ex => {
          const item = document.createElement('div');
          item.className = 'ex-item';

          const left = document.createElement('div');
          left.className = 'ex-left';

          const ck = document.createElement('input');
          ck.type = 'checkbox';
          ck.className = 'ex-checkbox';
          ck.id = 'ck_' + ex.id;
          ck.dataset.ex = ex.id;

          const name = document.createElement('div');
          name.className = 'ex-name';
          name.textContent = ex.name;

          left.appendChild(ck);
          left.appendChild(name);

          const controls = document.createElement('div');
          controls.className = 'ex-controls';

          if(type === 'cardio'){
            const dur = document.createElement('input');
            dur.type = 'number';
            dur.min = 1;
            dur.value = ex.defaultDuration || 20;
            dur.className = 'small-input';
            dur.dataset.prop = 'duration';
            const durLabel = document.createElement('div');
            durLabel.className = 'muted';
            durLabel.style.fontSize = '12px';
            durLabel.textContent = 'min';
            const cal = document.createElement('input');
            cal.type = 'number';
            cal.min = 0;
            cal.value = 0;
            cal.className = 'small-input';
            cal.dataset.prop = 'calories';
            controls.appendChild(dur);
            controls.appendChild(durLabel);
            controls.appendChild(cal);
          } else {
            const weight = document.createElement('input');
            weight.type = 'number';
            weight.step = '0.5';
            weight.className = 'small-input';
            weight.value = ex.defaultWeight || 0;
            weight.dataset.prop = 'weight';
            const kg = document.createElement('div');
            kg.className = 'muted';
            kg.style.fontSize = '12px';
            kg.textContent = 'kg';
            const sets = document.createElement('input');
            sets.type = 'number';
            sets.min = 1;
            sets.className = 'small-input';
            sets.value = ex.sets || 3;
            sets.dataset.prop = 'sets';
            const reps = document.createElement('input');
            reps.type = 'number';
            reps.min = 1;
            reps.className = 'small-input';
            reps.value = ex.reps || 10;
            reps.dataset.prop = 'reps';
            controls.appendChild(weight);
            controls.appendChild(kg);
            controls.appendChild(sets);
            controls.appendChild(reps);
          }

          item.appendChild(left);
          item.appendChild(controls);
          area.appendChild(item);

          function updateHighlight() {
            if(ck.checked) {
              item.classList.add('selected');
            } else {
              item.classList.remove('selected');
            }
          }

          ck.addEventListener('change', updateHighlight);

          left.addEventListener('click', (ev) => {
            if(ev.target === ck) return; 
            ev.preventDefault();
            ck.checked = !ck.checked;
            updateHighlight();
          });
        });
      }

      function readSessionForm(){
        const date = qs('#sessionDate').value || fmtDate(new Date());
        const type = qs('#workoutType').value;
        const exercises = [];
        qsa('#exercisesArea .ex-item').forEach(item => {
          const ck = item.querySelector('input[type="checkbox"]');
          if(!ck || !ck.checked) return;
          const exId = ck.dataset.ex;
          const cat = (CATALOG[type] || []).find(e => e.id === exId);
          if(!cat) return;
          if(type === 'cardio'){
            const duration = parseInt(item.querySelector('[data-prop="duration"]').value) || cat.defaultDuration || 20;
            const calories = parseInt(item.querySelector('[data-prop="calories"]').value) || 0;
            exercises.push({ id: exId, name: cat.name, durationMin: duration, calories });
          } else {
            const weightKg = parseFloat(item.querySelector('[data-prop="weight"]').value) || cat.defaultWeight || 0;
            const sets = parseInt(item.querySelector('[data-prop="sets"]').value) || cat.sets || 3;
            const reps = parseInt(item.querySelector('[data-prop="reps"]').value) || cat.reps || 10;
            exercises.push({ id: exId, name: cat.name, weightKg, sets, reps });
          }
        });
        return {
          id: 's' + Date.now(),
          date,
          weekday: weekdayName(parseDate(date)),
          type,
          calories: parseInt(qs('#sessionCalories').value) || 0,
          notes: qs('#sessionNotes').value || '',
          exercises,
          done: false
        };
      }

      function renderPlan(){
        const plan = loadPlan();
        const area = qs('#planArea');
        area.innerHTML = '';
        if(!plan.length){
          area.innerHTML = '<div class="panel muted">No sessions yet. Build a session above and click "Add Session".</div>';
          return;
        }
        plan.forEach(session => {
          const card = document.createElement('div'); card.className = 'session';
          const meta = document.createElement('div'); meta.className = 'meta';
          meta.innerHTML = `<div class="date">${session.date}</div>
                            <div class="weekday">${session.weekday} · ${session.type.toUpperCase()}</div>
                            <div style="margin-top:6px" class="muted">Kcal: ${session.calories}</div>
                            <div class="muted" style="font-size:12px;margin-top:4px">${session.notes ? 'Note: ' + session.notes : ''}</div>
                            <div style="margin-top:10px"><button class="done-btn ${session.done}" data-id="${session.id}">${session.done ? 'Done' : 'Mark Done'}</button></div>
                            <div style="margin-top:8px"><button class="trash" data-id="${session.id}">Delete</button></div>`;
          card.appendChild(meta);

          const exWrap = document.createElement('div'); exWrap.style.flexGrow = '1'; exWrap.style.width = '100%';
          const table = document.createElement('table');
          let thead = '<thead>';
          if(session.type === 'cardio') thead += '<tr><th>Exercise</th><th>Min</th><th>Kcal</th><th></th></tr></thead>';
          else thead += '<tr><th>Exercise</th><th>Kg</th><th>Sets</th><th>Reps</th></tr></thead>';
          let tbody = '<tbody>';
          session.exercises.forEach(ex => {
            if(session.type === 'cardio'){
              tbody += `<tr>
                <td><strong>${ex.name}</strong></td>
                <td><input class="small-input" type="number" data-sid="${session.id}" data-eid="${ex.id}" data-field="durationMin" value="${ex.durationMin}"></td>
                <td><input class="small-input" type="number" data-sid="${session.id}" data-eid="${ex.id}" data-field="calories" value="${ex.calories||0}"></td>
                <td></td>
              </tr>`;
            } else {
              tbody += `<tr>
                <td><strong>${ex.name}</strong></td>
                <td><input class="small-input" type="number" step="0.5" data-sid="${session.id}" data-eid="${ex.id}" data-field="weightKg" value="${ex.weightKg}"></td>
                <td><input class="small-input" type="number" data-sid="${session.id}" data-eid="${ex.id}" data-field="sets" value="${ex.sets}"></td>
                <td><input class="small-input" type="number" data-sid="${session.id}" data-eid="${ex.id}" data-field="reps" value="${ex.reps}"></td>
              </tr>`;
            }
          });
          tbody += '</tbody>';
          table.innerHTML = thead + tbody;
          exWrap.appendChild(table);
          card.appendChild(exWrap);
          area.appendChild(card);
        });

        // wire plan controls
        qsa('.done-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            const p = loadPlan(); const s = p.find(x => x.id === id);
            if(!s) return;
            s.done = !s.done; savePlan(p); renderPlan();
          });
        });
        qsa('.trash').forEach(btn => {
          btn.addEventListener('click', () => {
            if(!confirm('Delete session?')) return;
            const id = btn.dataset.id;
            const p = loadPlan().filter(x => x.id !== id);
            savePlan(p); renderPlan();
          });
        });
        qsa('input[data-sid]').forEach(inp => {
          inp.addEventListener('input', () => {
            const sid = inp.dataset.sid, eid = inp.dataset.eid, field = inp.dataset.field;
            const p = loadPlan(); const s = p.find(x=>x.id===sid); if(!s) return;
            const ex = s.exercises.find(x=>x.id===eid); if(!ex) return;
            if(field === 'weightKg') ex.weightKg = parseFloat(inp.value) || 0;
            else ex[field] = parseInt(inp.value) || 0;
            savePlan(p);
          });
          inp.addEventListener('blur', () => renderPlan());
        });
      }

      function init(){
        qs('#sessionDate').value = fmtDate(new Date());
        buildExercisesUI(qs('#workoutType').value);
        qs('#workoutType').addEventListener('change', e => buildExercisesUI(e.target.value));

        qs('#addSessionBtn').addEventListener('click', () => {
          const s = readSessionForm();
          if(!s.exercises.length){ alert('Please select at least one exercise.'); return; }
          const p = loadPlan(); p.push(s); savePlan(p); renderPlan();
          // Reset controls
          qsa('#exercisesArea input[type="checkbox"]').forEach(cb => { cb.checked = false; });
          qsa('#exercisesArea .ex-item').forEach(el => el.classList.remove('selected'));
          qs('#sessionNotes').value = ''; qs('#sessionCalories').value = '0';
        });

        qs('#clearAllBtn').addEventListener('click', () => {
          if(!confirm('Clear all sessions?')) return;
          savePlan([]); renderPlan();
        });

        qs('#exportBtn').addEventListener('click', () => {
          const data = JSON.stringify(loadPlan(), null, 2);
          qs('#exportBox').value = data;
          try { navigator.clipboard && navigator.clipboard.writeText(data); } catch(e){}
          alert('JSON placed in the box and copied to clipboard if allowed.');
        });

        qs('#importBtn').addEventListener('click', () => {
          const raw = qs('#exportBox').value.trim();
          if(!raw){ alert('Paste JSON into the box to import.'); return; }
          try {
            const parsed = JSON.parse(raw);
            if(!Array.isArray(parsed)) throw new Error('Expected an array of sessions');
            savePlan(parsed); renderPlan(); alert('Import complete.');
          } catch(err) {
            alert('Import failed: ' + (err && err.message ? err.message : 'invalid JSON'));
          }
        });

        renderPlan();
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
