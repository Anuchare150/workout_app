<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Workout Planner — Upper / Leg / Cardio</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <style id="appStyle">
    :root{
      --bg1:#0b1220;
      --bg2:#0f2540;
      --panel: rgba(255,255,255,0.03);
      --muted: rgba(255,255,255,0.72);
      --accent1: #7c3aed;
      --accent2: #06b6d4;
      --good: #10b981;
      --danger: #ef4444;
      --card-radius:12px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:#ffffff;padding:20px;-webkit-font-smoothing:antialiased;
    }

    .app{max-width:1100px;margin:0 auto;background:rgba(255,255,255,0.01);border-radius:var(--card-radius);padding:18px;border:1px solid rgba(255,255,255,0.03)}

    header{display:flex;gap:14px;align-items:center;margin-bottom:14px}
    .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px}
    h1{margin:0;font-size:18px}
    p.lead{margin:0;color:var(--muted);font-size:13px}

    .panel{background:var(--panel);border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.03)}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
    label.small{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
    
    /* THE ABSOLUTE WEBKIT FIX FOR INVISIBLE TEXT ON IOS */
    input[type="text"], input[type="date"], select, textarea {
      width:100%;
      padding:8px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.2);
      background-color: #162235 !important; 
      color: #ffffff !important;
      -webkit-text-fill-color: #ffffff !important; /* Forces iOS to display text color */
      opacity: 1 !important; /* Stops iOS from graying out fields */
      font-size: 16px !important; /* Prevents auto-zoom on click */
      -webkit-appearance: none !important;
      appearance: none !important;
    }

    /* Force visibility for placeholders */
    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.4) !important;
      -webkit-text-fill-color: rgba(255,255,255,0.4) !important;
      opacity: 1 !important;
    }
    
    .col-3{grid-column:span 3}
    .col-2{grid-column:span 2}
    .col-4{grid-column:span 4}
    .col-6{grid-column:span 6}
    .col-12{grid-column:span 12}
    .actions{display:flex;gap:8px;align-items:center}
    button{background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#ffffff;border:0;padding:9px 12px;border-radius:8px;cursor:pointer;font-weight:700}
    button.ghost{background:transparent;color:#ffffff;border:1px solid rgba(255,255,255,0.15)}
    .muted{color:var(--muted);font-size:13px}

    .ex-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
    .ex-item{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,0.01);padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.03)}
    .ex-item input[type="checkbox"]{transform:scale(1.15)}
    .ex-name{min-width:150px;font-weight:700}
    .ex-controls{display:flex;gap:8px;align-items:center;margin-left:auto}
    
    /* INLINE TABLE INPUT FIX FOR IOS */
    .small-input {
      width:75px;
      padding:6px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,0.2);
      background-color: #1e2d4a !important;
      color: #ffffff !important;
      -webkit-text-fill-color: #ffffff !important;
      opacity: 1 !important;
      font-size: 15px !important;
      text-align: center;
      -webkit-appearance: none !important;
      appearance: none !important;
    }

    .plan{display:flex;flex-direction:column;gap:10px}
    .session{display:flex;gap:12px;align-items:flex-start;background:rgba(255,255,255,0.02);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03)}
    .session .meta{width:170px;flex-shrink:0}
    .session .date{font-weight:800}
    .session .weekday{color:var(--muted);font-size:13px;margin-top:4px}
    table{width:100%;border-collapse:collapse;color:#ffffff;font-size:14px}
    th,td{padding:8px 10px;text-align:left;border-bottom:1px dashed rgba(255,255,255,0.05)}
    th{color:var(--muted);font-weight:700;font-size:13px}
    .done-btn{margin-left:auto;padding:8px 10px;border-radius:8px;background:linear-gradient(90deg,#10b981,#059669);color:#fff;border:0;cursor:pointer}
    .done-btn.false{background:linear-gradient(90deg,#7c3aed,#06b6d4)}

    .controls{display:flex;gap:8px;align-items:center}
    .exportbox{width:100%;height:90px;padding:8px;border-radius:8px;border:1px dashed rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#ffffff;-webkit-text-fill-color: #ffffff !important;resize:vertical}

    .trash{background:transparent;border:0;color:var(--danger);cursor:pointer;font-weight:700;padding:4px}
    .download-buttons{display:flex;gap:8px;margin-left:8px}

    @media(max-width:900px){
      .col-3{grid-column:span 6}
      .col-2{grid-column:span 6}
      .meta{width:140px}
      .small-input{width:65px}
    }
  </style>
</head>
<body>
  <div class="app" role="application">
    <header>
      <div class="logo">WP</div>
      <div>
        <h1>Workout Planner</h1>
        <p class="lead">Track your Leg, Upper Body, or Cardio workouts directly inside your browser.</p>
      </div>
    </header>

    <div class="panel">
      <form id="sessionForm" onsubmit="return false;">
        <div class="grid">
          <div class="col-3">
            <label class="small">Date</label>
            <input id="sessionDate" type="date" />
          </div>
          <div class="col-3">
            <label class="small">Workout type</label>
            <select id="workoutType">
              <option value="leg">Leg Workout</option>
              <option value="upper">Upper Body</option>
              <option value="cardio">Cardio</option>
            </select>
          </div>
          <div class="col-3">
            <label class="small">Session calories (kcal)</label>
            <input id="sessionCalories" type="text" inputmode="numeric" value="0" />
          </div>
          <div class="col-3">
            <label class="small">Notes</label>
            <input id="sessionNotes" type="text" placeholder="e.g., focus on form" />
          </div>

          <div class="col-12">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <div style="font-weight:800">Exercises</div>
            </div>
            <div id="exercisesArea" class="ex-list"></div>
          </div>

          <div class="col-12" style="display:flex;gap:8px;align-items:center;margin-top:8px">
            <div class="actions">
              <button id="addSessionBtn" type="button">Add Session</button>
              <button id="clearAllBtn" type="button" class="ghost">Clear All</button>
            </div>
            <div style="margin-left:auto" class="muted">Saved locally in your device.</div>
          </div>
        </div>
      </form>
    </div>

    <div id="planArea"></div>

    <div class="panel" style="margin-top:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <strong>Backup & Restore Data</strong>
        </div>
        <div class="controls">
          <button id="exportBtn" class="ghost" type="button">Copy JSON</button>
          <button id="importBtn" class="ghost" type="button">Load JSON</button>
          <div class="download-buttons">
            <button id="downloadCss" class="ghost" type="button">Download CSS</button>
            <button id="downloadJs" class="ghost" type="button">Download JS</button>
          </div>
        </div>
      </div>
      <textarea id="exportBox" class="exportbox" placeholder="Your data layout JSON string will show here..."></textarea>
    </div>
  </div>

  <script id="appScript">
    const STORAGE_KEY = 'workout_planner_ios_fixed_v2';

    const CATALOG = {
      leg: [
        { id:'legpress', name:'Leg Press', defaultWeight:26, sets:3, reps:10 },
        { id:'legcurl', name:'Leg Curl', defaultWeight:26, sets:3, reps:10 },
        { id:'squats', name:'Weighted Squats', defaultWeight:4, sets:3, reps:10 },
        { id:'lunges', name:'Lunges', defaultWeight:2, sets:3, reps:10 }
      ],
      upper: [
        { id:'pull', name:'Lat Pull-down / Row', defaultWeight:20, sets:3, reps:8 },
        { id:'bench', name:'Bench Press', defaultWeight:20, sets:3, reps:8 },
        { id:'ohp', name:'Overhead Press', defaultWeight:10, sets:3, reps:8 },
        { id:'dbrow', name:'Dumbbell Row', defaultWeight:12, sets:3, reps:8 },
        { id:'curl', name:'Bicep Curl', defaultWeight:6, sets:3, reps:10 }
      ],
      cardio: [
        { id:'treadmill', name:'Treadmill', defaultDuration:20 }
      ]
    };

    const qs = s => document.querySelector(s);
    const qsa = s => Array.from(document.querySelectorAll(s));
    function fmtDate(d){ return `${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`; }
    function parseDate(s){ return s ? new Date(s+'T00:00:00') : new Date(); }
    function weekdayName(d){ return d.toLocaleDateString(undefined,{weekday:'short'}); }

    function loadPlan(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e){ return []; } }
    function savePlan(p){ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

    function buildExercisesUI(type){
      const area = qs('#exercisesArea'); area.innerHTML = '';
      (CATALOG[type] || []).forEach(ex => {
        const el = document.createElement('div'); el.className = 'ex-item';
        el.innerHTML = `<input type="checkbox" id="ck_${ex.id}" data-ex="${ex.id}">
                        <div class="ex-name">${ex.name}</div>
                        <div class="ex-controls"></div>`;
        const ctrl = el.querySelector('.ex-controls');
        if(type === 'cardio'){
          ctrl.innerHTML = `<input type="text" inputmode="numeric" data-prop="duration" value="${ex.defaultDuration||20}" class="small-input" /> <span class="muted" style="font-size:12px">min</span>
                            <input type="text" inputmode="numeric" data-prop="calories" value="0" class="small-input" placeholder="kcal" />`;
        } else {
          ctrl.innerHTML = `<input type="text" inputmode="decimal" data-prop="weight" value="${ex.defaultWeight||0}" class="small-input" /> <span class="muted" style="font-size:12px">kg</span>
                            <input type="text" inputmode="numeric" data-prop="sets" value="${ex.sets||3}" class="small-input" />
                            <input type="text" inputmode="numeric" data-prop="reps" value="${ex.reps||10}" class="small-input" />`;
        }
        area.appendChild(el);
      });
    }

    function readSessionForm(){
      const date = qs('#sessionDate').value || fmtDate(new Date());
      const type = qs('#workoutType').value;
      const exercises = [];
      qsa('#exercisesArea .ex-item').forEach(item => {
        if(!item.querySelector('input[type="checkbox"]').checked) return;
        const exId = item.querySelector('input[type="checkbox"]').dataset.ex;
        const cat = CATALOG[type].find(e=>e.id===exId);
        if(!cat) return;
        if(type==='cardio'){
          exercises.push({
            id: exId, name: cat.name,
            durationMin: parseInt(item.querySelector('[data-prop="duration"]').value)||20,
            calories: parseInt(item.querySelector('[data-prop="calories"]').value)||0
          });
        }else{
          exercises.push({
            id: exId, name: cat.name,
            weightKg: parseFloat(item.querySelector('[data-prop="weight"]').value)||0,
            sets: parseInt(item.querySelector('[data-prop="sets"]').value)||3,
            reps: parseInt(item.querySelector('[data-prop="reps"]').value)||10
          });
        }
      });
      return {
        id: 's'+Date.now(), date, weekday: weekdayName(parseDate(date)), type,
        calories: parseInt(qs('#sessionCalories').value)||0,
        notes: qs('#sessionNotes').value||'', exercises, done: false
      };
    }

    function renderPlan(){
      const plan = loadPlan();
      const area = qs('#planArea'); area.innerHTML = '';
      if(!plan.length){
        area.innerHTML = '<div class="panel muted">No workout sessions recorded yet.</div>';
        return;
      }
      plan.forEach(s => {
        const d = document.createElement('div'); d.className = 'session';
        let rows = '';
        s.exercises.forEach(e => {
          if(s.type === 'cardio'){
            rows += `<tr><td><strong>${e.name}</strong></td>
                     <td><input type="text" inputmode="numeric" value="${e.durationMin}" data-sid="${s.id}" data-eid="${e.id}" data-p="durationMin" class="small-input"></td>
                     <td><input type="text" inputmode="numeric" value="${e.calories||0}" data-sid="${s.id}" data-eid="${e.id}" data-p="calories" class="small-input"></td><td></td></tr>`;
          } else {
            rows += `<tr><td><strong>${e.name}</strong></td>
                     <td><input type="text" inputmode="decimal" value="${e.weightKg}" data-sid="${s.id}" data-eid="${e.id}" data-p="weightKg" class="small-input"></td>
                     <td><input type="text" inputmode="numeric" value="${e.sets}" data-sid="${s.id}" data-eid="${e.id}" data-p="sets" class="small-input"></td>
                     <td><input type="text" inputmode="numeric" value="${e.reps}" data-sid="${s.id}" data-eid="${e.id}" data-p="reps" class="small-input"></td></tr>`;
          }
        });

        d.innerHTML = `<div class="meta">
          <div class="date">${s.date}</div>
          <div class="weekday">${s.weekday} · ${s.type.toUpperCase()}</div>
          <div style="margin-top:6px" class="muted">Kcal: ${s.calories}</div>
          <div class="muted" style="font-size:12px;margin-top:4px">${s.notes?'Note: '+s.notes:''}</div>
          <div style="margin-top:12px"><button class="done-btn ${s.done}" data-id="${s.id}">${s.done?'Done':'Mark Done'}</button></div>
          <div style="margin-top:8px"><button class="trash" data-id="${s.id}">Delete</button></div>
        </div>
        <div style="flex-grow:1">
          <table>
            <thead><tr><th>Exercise</th><th>${s.type==='cardio'?'Min':'Kg'}</th><th>${s.type==='cardio'?'Kcal':'Sets'}</th><th>${s.type==='cardio'?'':'Reps'}</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
        area.appendChild(d);
      });

      qsa('.done-btn').forEach(b => b.addEventListener('click', ()=>{
        const p = loadPlan(); const s = p.find(x=>x.id===b.dataset.id); if(s){ s.done=!s.done; savePlan(p); renderPlan(); }
      }));
      qsa('.trash').forEach(b => b.addEventListener('click', ()=>{
        if(confirm('Delete session?')){ savePlan(loadPlan().filter(x=>x.id!==b.dataset.id)); renderPlan(); }
      }));
      qsa('input[data-sid]').forEach(input => input.addEventListener('change', ()=>{
        const p = loadPlan(); const s = p.find(x=>x.id===input.dataset.sid); if(!s) return;
        const e = s.exercises.find(ex=>ex.id===input.dataset.eid); if(!e) return;
        const field = input.dataset.p;
        e[field] = field === 'weightKg' ? parseFloat(input.value)||0 : parseInt(input.value)||0;
        savePlan(p); renderPlan();
      }));
    }

    function downloadFile(name, content) {
      const blob = new Blob([content], {type: 'text/plain'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
    }

    function init(){
      qs('#sessionDate').value = fmtDate(new Date());
      buildExercisesUI(qs('#workoutType').value);
      qs('#workoutType').addEventListener('change', (e)=>buildExercisesUI(e.target.value));
      
      qs('#addSessionBtn').addEventListener('click', ()=>{
        const s = readSessionForm(); if(!s.exercises.length){ alert('Check at least one exercise!'); return; }
        const p = loadPlan(); p.push(s); savePlan(p); renderPlan();
        qsa('#exercisesArea input[type="checkbox"]').forEach(c=>c.checked=false);
        qs('#sessionNotes').value = ''; qs('#sessionCalories').value = '0';
      });

      qs('#clearAllBtn').addEventListener('click', ()=>{ if(confirm('Clear all?')){ savePlan([]); renderPlan(); } });
      qs('#exportBtn').addEventListener('click', ()=>{ qs('#exportBox').value = JSON.stringify(loadPlan()); alert('Data copied to export box.'); });
      qs('#importBtn').addEventListener('click', ()=>{
        try{ const data = JSON.parse(qs('#exportBox').value); if(Array.isArray(data)){ savePlan(data); renderPlan(); alert('Import complete!'); } }catch(e){ alert('Invalid JSON structural formatting.'); }
      });

      qs('#downloadCss').addEventListener('click', () => downloadFile('style.css', qs('#appStyle').textContent));
      qs('#downloadJs').addEventListener('click', () => downloadFile('script.js', qs('#appScript').textContent));

      renderPlan();
    }
    init();
  </script>
</body>
</html>
