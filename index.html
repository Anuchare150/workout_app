<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Workout Planner — Mobile Friendly Inputs</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#0f2540;
      --panel: rgba(255,255,255,0.03);
      --muted: rgba(255,255,255,0.72);
      --accent1: #7c3aed;
      --accent2: #06b6d4;
      --good: #10b981;
      --danger: #ef4444;
      --card-radius:12px;
      --input-bg:#122033;
      --input-border: rgba(255,255,255,0.12);
      --max-width:1100px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:#ffffff;padding:18px;-webkit-font-smoothing:antialiased;
    }

    .container{max-width:var(--max-width);margin:0 auto}
    .app{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:var(--card-radius);padding:16px;border:1px solid rgba(255,255,255,0.03)}

    header{display:flex;gap:12px;align-items:center;margin-bottom:12px}
    .logo{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
    h1{margin:0;font-size:18px}
    p.lead{margin:0;color:var(--muted);font-size:13px}

    .panel{background:var(--panel);border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.03)}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
    label.small{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}

    /* Inputs: Mobile / iOS focused fixes */
    input, select, textarea {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid var(--input-border);
      background: var(--input-bg);
      color: #fff;
      font-size:16px; /* prevent iOS auto-zoom */
      -webkit-text-fill-color: #fff; /* enforce color in iOS */
      caret-color: #fff;
      -webkit-appearance: none;
      appearance: none;
    }

    /* small inline inputs */
    .small-input {
      min-width:72px;
      max-width:140px;
      padding:8px;
      border-radius:8px;
      border:1px solid var(--input-border);
      background: var(--input-bg);
      color:#fff;
      font-size:16px;
      -webkit-text-fill-color:#fff;
      caret-color:#fff;
      -webkit-appearance: none;
      appearance: none;
      text-align:center;
    }

    /* specific fixes for number inputs across browsers */
    input[type="number"]{-moz-appearance:textfield;}
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; -webkit-appearance: textfield; }

    /* placeholder visibility */
    ::placeholder { color: rgba(255,255,255,0.45); -webkit-text-fill-color: rgba(255,255,255,0.45); opacity:1; }

    .col-3{grid-column:span 3}
    .col-2{grid-column:span 2}
    .col-4{grid-column:span 4}
    .col-6{grid-column:span 6}
    .col-12{grid-column:span 12}
    .actions{display:flex;gap:8px;align-items:center}
    button{background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#ffffff;border:0;padding:10px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-size:15px}
    button.ghost{background:transparent;color:#ffffff;border:1px solid rgba(255,255,255,0.12)}

    .ex-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
    .ex-item{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,0.01);padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03)}
    .ex-item input[type="checkbox"]{transform:scale(1.15);width:20px;height:20px}
    .ex-name{min-width:140px;font-weight:700}
    .ex-controls{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}

    .plan{display:flex;flex-direction:column;gap:10px}
    .session{display:flex;gap:12px;align-items:flex-start;background:rgba(255,255,255,0.02);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03)}
    .session .meta{width:170px;flex-shrink:0}
    .session .date{font-weight:800}
    .session .weekday{color:var(--muted);font-size:13px;margin-top:4px}
    table{width:100%;border-collapse:collapse;color:#ffffff;font-size:14px}
    th,td{padding:8px 10px;text-align:left;border-bottom:1px dashed rgba(255,255,255,0.05)}
    th{color:var(--muted);font-weight:700;font-size:13px}
    .done-btn{margin-left:auto;padding:8px 10px;border-radius:8px;background:linear-gradient(90deg,#10b981,#059669);color:#fff;border:0;cursor:pointer}
    .done-btn.false{background:linear-gradient(90deg,#7c3aed,#06b6d4)}

    .controls{display:flex;gap:8px;align-items:center}
    .exportbox{width:100%;height:92px;padding:10px;border-radius:8px;border:1px dashed rgba(255,255,255,0.12);background:rgba(255,255,255,0.03);color:#fff;resize:vertical}

    .trash{background:transparent;border:0;color:var(--danger);cursor:pointer;font-weight:700;padding:6px}
    .download-buttons{display:flex;gap:8px;margin-left:8px}

    .muted{color:var(--muted);font-size:13px}

    @media (max-width:900px){
      .col-3{grid-column:span 6}
      .col-2{grid-column:span 6}
      .meta{width:140px}
      .small-input{min-width:60px;padding:8px;font-size:15px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app" role="application" aria-label="Workout Planner">
      <header>
        <div class="logo">WP</div>
        <div>
          <h1>Workout Planner</h1>
          <p class="lead">Leg, Upper Body, Cardio — set kg, sets, reps, and durations. Mobile friendly inputs.</p>
        </div>
      </header>

      <div class="panel">
        <form id="sessionForm" onsubmit="return false;">
          <div class="grid">
            <div class="col-3">
              <label class="small">Date</label>
              <input id="sessionDate" type="date" />
            </div>
            <div class="col-3">
              <label class="small">Workout type</label>
              <select id="workoutType" aria-label="Workout type">
                <option value="leg">Leg Workout</option>
                <option value="upper">Upper Body</option>
                <option value="cardio">Cardio</option>
              </select>
            </div>
            <div class="col-3">
              <label class="small">Session calories (kcal)</label>
              <input id="sessionCalories" type="number" inputmode="numeric" value="0" min="0" />
            </div>
            <div class="col-3">
              <label class="small">Notes</label>
              <input id="sessionNotes" type="text" placeholder="e.g., focus on form" />
            </div>

            <div class="col-12">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div style="font-weight:800">Exercises</div>
                <div class="muted">Tap to select, edit kg/sets/reps or duration/cal for cardio.</div>
              </div>
              <div id="exercisesArea" class="ex-list" aria-live="polite"></div>
            </div>

            <div class="col-12" style="display:flex;gap:8px;align-items:center;margin-top:8px">
              <div class="actions">
                <button id="addSessionBtn" type="button">Add Session</button>
                <button id="clearAllBtn" type="button" class="ghost">Clear All</button>
              </div>
              <div style="margin-left:auto" class="muted">Saved locally on this device.</div>
            </div>
          </div>
        </form>
      </div>

      <div id="planArea"></div>

      <div class="panel" style="margin-top:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div>
            <strong>Backup & Restore Data</strong>
            <div class="muted" style="margin-top:4px">Copy JSON to back up or paste to restore.</div>
          </div>
          <div class="controls">
            <button id="exportBtn" class="ghost" type="button">Copy JSON</button>
            <button id="importBtn" class="ghost" type="button">Load JSON</button>
            <div class="download-buttons">
              <button id="downloadCss" class="ghost" type="button">Download CSS</button>
              <button id="downloadJs" class="ghost" type="button">Download JS</button>
            </div>
          </div>
        </div>
        <textarea id="exportBox" class="exportbox" placeholder="Your data JSON will appear here..."></textarea>
      </div>
    </div>
  </div>

  <script>
    // Mobile-friendly Workout Planner
    const STORAGE_KEY = 'workout_planner_mobile_v1';

    const CATALOG = {
      leg: [
        { id:'legpress', name:'Leg Press', defaultWeight:26, sets:3, reps:10 },
        { id:'legcurl', name:'Leg Curl', defaultWeight:26, sets:3, reps:10 },
        { id:'squats', name:'Weighted Squats', defaultWeight:4, sets:3, reps:10 },
        { id:'lunges', name:'Lunges', defaultWeight:2, sets:3, reps:10 }
      ],
      upper: [
        { id:'pull', name:'Lat Pull-down / Row', defaultWeight:20, sets:3, reps:8 },
        { id:'bench', name:'Bench Press', defaultWeight:20, sets:3, reps:8 },
        { id:'ohp', name:'Overhead Press', defaultWeight:10, sets:3, reps:8 },
        { id:'dbrow', name:'Dumbbell Row', defaultWeight:12, sets:3, reps:8 },
        { id:'curl', name:'Bicep Curl', defaultWeight:6, sets:3, reps:10 }
      ],
      cardio: [
        { id:'treadmill', name:'Treadmill', defaultDuration:20 }
      ]
    };

    const qs = s => document.querySelector(s);
    const qsa = s => Array.from(document.querySelectorAll(s));

    function fmtDate(d){
      return `${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`;
    }
    function parseDate(s){ return s ? new Date(s+'T00:00:00') : new Date(); }
    function weekdayName(d){ return d.toLocaleDateString(undefined,{weekday:'short'}); }

    function loadPlan(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e){ return []; } }
    function savePlan(p){ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

    // Build exercise selection UI for chosen type
    function buildExercisesUI(type){
      const area = qs('#exercisesArea');
      area.innerHTML = '';
      (CATALOG[type] || []).forEach(ex => {
        const el = document.createElement('div');
        el.className = 'ex-item';
        // checkbox and name
        const ck = document.createElement('input'); ck.type = 'checkbox'; ck.id = 'ck_'+ex.id; ck.dataset.ex = ex.id;
        const nameDiv = document.createElement('div'); nameDiv.className = 'ex-name'; nameDiv.textContent = ex.name;
        el.appendChild(ck);
        el.appendChild(nameDiv);

        // controls
        const ctrl = document.createElement('div'); ctrl.className = 'ex-controls';
        if(type === 'cardio'){
          const dur = document.createElement('input'); dur.type = 'number'; dur.inputMode = 'numeric'; dur.min = 1; dur.value = ex.defaultDuration || 20;
          dur.className = 'small-input'; dur.dataset.prop = 'duration';
          const durLabel = document.createElement('div'); durLabel.className = 'muted'; durLabel.style.fontSize = '12px'; durLabel.textContent = 'min';
          const cal = document.createElement('input'); cal.type = 'number'; cal.inputMode = 'numeric'; cal.min = 0; cal.value = 0; cal.className = 'small-input'; cal.dataset.prop = 'calories';
          ctrl.appendChild(dur); ctrl.appendChild(durLabel); ctrl.appendChild(cal);
        } else {
          const weight = document.createElement('input'); weight.type = 'number'; weight.inputMode = 'decimal'; weight.step = '0.5'; weight.className = 'small-input'; weight.value = ex.defaultWeight || 0; weight.dataset.prop = 'weight';
          const kg = document.createElement('div'); kg.className = 'muted'; kg.style.fontSize = '12px'; kg.textContent = 'kg';
          const sets = document.createElement('input'); sets.type = 'number'; sets.inputMode = 'numeric'; sets.min = 1; sets.className = 'small-input'; sets.value = ex.sets || 3; sets.dataset.prop = 'sets';
          const reps = document.createElement('input'); reps.type = 'number'; reps.inputMode = 'numeric'; reps.min = 1; reps.className = 'small-input'; reps.value = ex.reps || 10; reps.dataset.prop = 'reps';
          ctrl.appendChild(weight); ctrl.appendChild(kg); ctrl.appendChild(sets); ctrl.appendChild(reps);
        }
        el.appendChild(ctrl);
        area.appendChild(el);
      });
    }

    // Read session data from form
    function readSessionForm(){
      const date = qs('#sessionDate').value || fmtDate(new Date());
      const type = qs('#workoutType').value;
      const exercises = [];
      qsa('#exercisesArea .ex-item').forEach(item=>{
        const checkbox = item.querySelector('input[type="checkbox"]');
        if(!checkbox || !checkbox.checked) return;
        const exId = checkbox.dataset.ex;
        const catalog = (CATALOG[type] || []).find(e => e.id === exId);
        if(!catalog) return;
        if(type === 'cardio'){
          const duration = parseInt(item.querySelector('[data-prop="duration"]').value) || catalog.defaultDuration || 20;
          const calories = parseInt(item.querySelector('[data-prop="calories"]').value) || 0;
          exercises.push({ id: exId, name: catalog.name, durationMin: duration, calories });
        } else {
          const weightKg = parseFloat(item.querySelector('[data-prop="weight"]').value) || catalog.defaultWeight || 0;
          const sets = parseInt(item.querySelector('[data-prop="sets"]').value) || catalog.sets || 3;
          const reps = parseInt(item.querySelector('[data-prop="reps"]').value) || catalog.reps || 10;
          exercises.push({ id: exId, name: catalog.name, weightKg, sets, reps });
        }
      });
      return {
        id: 's' + Date.now(),
        date,
        weekday: weekdayName(parseDate(date)),
        type,
        calories: parseInt(qs('#sessionCalories').value) || 0,
        notes: qs('#sessionNotes').value || '',
        exercises,
        done: false
      };
    }

    // Render saved plan
    function renderPlan(){
      const plan = loadPlan();
      const area = qs('#planArea');
      area.innerHTML = '';
      if(!plan.length){
        area.innerHTML = '<div class="panel muted">No workout sessions recorded yet.</div>';
        return;
      }

      plan.forEach(session => {
        const card = document.createElement('div'); card.className = 'session';
        const meta = document.createElement('div'); meta.className = 'meta';
        meta.innerHTML = `<div class="date">${session.date}</div>
                          <div class="weekday">${session.weekday} · ${session.type.toUpperCase()}</div>
                          <div style="margin-top:6px" class="muted">Kcal: ${session.calories}</div>
                          <div class="muted" style="font-size:12px;margin-top:4px">${session.notes ? 'Note: ' + session.notes : ''}</div>
                          <div style="margin-top:10px"><button class="done-btn ${session.done ? 'true' : 'false'}" data-id="${session.id}">${session.done ? 'Done' : 'Mark Done'}</button></div>
                          <div style="margin-top:8px"><button class="trash" data-id="${session.id}" title="Delete">Delete</button></div>`;
        card.appendChild(meta);

        const exWrap = document.createElement('div'); exWrap.style.flexGrow = '1';
        const table = document.createElement('table');
        let thead = '<thead>';
        if(session.type === 'cardio'){
          thead += '<tr><th>Exercise</th><th>Min</th><th>Kcal</th><th></th></tr></thead>';
        } else {
          thead += '<tr><th>Exercise</th><th>Kg</th><th>Sets</th><th>Reps</th></tr></thead>';
        }
        let tbody = '<tbody>';
        session.exercises.forEach(ex => {
          if(session.type === 'cardio'){
            tbody += `<tr><td><strong>${ex.name}</strong></td>
                      <td><input class="small-input" type="number" inputmode="numeric" data-sid="${session.id}" data-eid="${ex.id}" data-field="durationMin" value="${ex.durationMin}"></td>
                      <td><input class="small-input" type="number" inputmode="numeric" data-sid="${session.id}" data-eid="${ex.id}" data-field="calories" value="${ex.calories||0}"></td>
                      <td></td></tr>`;
          } else {
            tbody += `<tr><td><strong>${ex.name}</strong></td>
                      <td><input class="small-input" type="number" inputmode="decimal" step="0.5" data-sid="${session.id}" data-eid="${ex.id}" data-field="weightKg" value="${ex.weightKg}"></td>
                      <td><input class="small-input" type="number" inputmode="numeric" data-sid="${session.id}" data-eid="${ex.id}" data-field="sets" value="${ex.sets}"></td>
                      <td><input class="small-input" type="number" inputmode="numeric" data-sid="${session.id}" data-eid="${ex.id}" data-field="reps" value="${ex.reps}"></td></tr>`;
          }
        });
        tbody += '</tbody>';
        table.innerHTML = thead + tbody;
        exWrap.appendChild(table);
        card.appendChild(exWrap);
        area.appendChild(card);
      });

      // Wire controls
      qsa('.done-btn').forEach(b => b.addEventListener('click', () => {
        const id = b.dataset.id;
        const p = loadPlan(); const s = p.find(x => x.id === id); if(s){ s.done = !s.done; savePlan(p); renderPlan(); }
      }));
      qsa('.trash').forEach(b => b.addEventListener('click', () => {
        if(!confirm('Delete session?')) return;
        const id = b.dataset.id;
        const p = loadPlan().filter(s => s.id !== id);
        savePlan(p); renderPlan();
      }));

      // Inline edits: use 'input' for immediate feedback on mobile
      qsa('input[data-sid]').forEach(inp => {
        inp.addEventListener('input', () => {
          const sid = inp.dataset.sid, eid = inp.dataset.eid, field = inp.dataset.field;
          const p = loadPlan(); const s = p.find(x=>x.id===sid); if(!s) return;
          const ex = s.exercises.find(x=>x.id===eid); if(!ex) return;
          // parse accordingly
          if(field === 'weightKg') ex.weightKg = parseFloat(inp.value) || 0;
          else ex[field] = parseInt(inp.value) || 0;
          savePlan(p);
        });
        // apply change on blur to re-render to keep UI updated & consistent
        inp.addEventListener('blur', () => renderPlan());
      });
    }

    // Download helpers
    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }

    // Init app wiring
    function init(){
      qs('#sessionDate').value = fmtDate(new Date());
      buildExercisesUI(qs('#workoutType').value);

      qs('#workoutType').addEventListener('change', (e) => buildExercisesUI(e.target.value));

      qs('#addSessionBtn').addEventListener('click', () => {
        const s = readSessionForm();
        if(!s.exercises.length){ alert('Please select at least one exercise.'); return; }
        const plan = loadPlan(); plan.push(s); savePlan(plan); renderPlan();
        // reset selections
        qsa('#exercisesArea input[type="checkbox"]').forEach(cb => cb.checked = false);
        qs('#sessionNotes').value = ''; qs('#sessionCalories').value = '0';
      });

      qs('#clearAllBtn').addEventListener('click', () => {
        if(!confirm('Clear all saved sessions?')) return;
        savePlan([]); renderPlan();
      });

      qs('#exportBtn').addEventListener('click', () => {
        const data = JSON.stringify(loadPlan(), null, 2);
        qs('#exportBox').value = data;
        try { navigator.clipboard && navigator.clipboard.writeText(data); } catch(e){}
        alert('JSON placed in the box and (if allowed) copied to clipboard.');
      });

      qs('#importBtn').addEventListener('click', () => {
        const raw = qs('#exportBox').value.trim();
        if(!raw){ alert('Paste JSON into the box to import.'); return; }
        try {
          const parsed = JSON.parse(raw);
          if(!Array.isArray(parsed)) throw new Error('Expected an array of sessions');
          savePlan(parsed);
          renderPlan();
          alert('Import complete.');
        } catch (err) {
          alert('Import failed: ' + (err && err.message ? err.message : 'invalid JSON'));
        }
      });

      // Download CSS / JS: return the <style> and <script> content for saving
      qs('#downloadCss').addEventListener('click', () => {
        const content = Array.from(document.querySelectorAll('style')).map(s => s.textContent).join('\n\n');
        downloadFile('style.css', content);
      });
      qs('#downloadJs').addEventListener('click', () => {
        // gather only the main script (this one)
        const script = document.querySelector('script[data-main="true"]');
        const content = script ? script.textContent : '// script content not found';
        downloadFile('script.js', content);
      });

      renderPlan();
    }

    // Expose small helper used in markup
    window.fmtDate = fmtDate;
    window.buildExercisesUI = buildExercisesUI;

    // mark main script for download reference
    document.currentScript.setAttribute('data-main', 'true');

    // start
    init();
  </script>
</body>
</html>
